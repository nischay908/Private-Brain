<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Test - Transformers.js</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    #status { padding: 20px; background: #2a2a2a; border-radius: 8px; margin-bottom: 20px; }
    #output { padding: 20px; background: #0a4a0a; border-radius: 8px; min-height: 100px; white-space: pre-wrap; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    input { padding: 10px; width: 100%; font-size: 16px; margin: 10px 0; }
    .error { background: #4a0a0a; }
  </style>
</head>
<body>
  <h1>🧪 Simple Transformers.js Test</h1>
  
  <div id="status">Loading...</div>
  
  <input type="text" id="prompt" placeholder="Type your prompt here..." value="The benefits of exercise are">
  <button onclick="generate()">Generate Text</button>
  
  <h3>Output:</h3>
  <div id="output">Click Generate to see output...</div>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    let generator = null;
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');

    // Suppress image errors
    const originalError = console.error;
    console.error = (...args) => {
      const msg = String(args[0]);
      if (msg.includes('image')) return; // Ignore image errors
      originalError(...args);
    };

    async function loadModel() {
      try {
        statusEl.textContent = 'Loading model... (first time takes 1-2 minutes)';
        
        generator = await pipeline('text-generation', 'Xenova/distilgpt2');
        
        statusEl.textContent = '✅ Model loaded! Ready to generate.';
        statusEl.style.background = '#0a4a0a';
        
        console.log('✅ Model ready!');
      } catch (err) {
        statusEl.textContent = '❌ Error: ' + err.message;
        statusEl.classList.add('error');
        console.error('Load error:', err);
      }
    }

    window.generate = async function() {
      if (!generator) {
        alert('Model not loaded yet!');
        return;
      }

      const prompt = document.getElementById('prompt').value;
      if (!prompt.trim()) {
        alert('Please enter a prompt');
        return;
      }

      try {
        outputEl.textContent = 'Generating...';
        
        console.log('🚀 Generating with prompt:', prompt);
        
        const result = await generator(prompt, {
          max_new_tokens: 50,
          temperature: 0.8,
          do_sample: true,
        });

        const generatedText = result[0].generated_text;
        
        outputEl.textContent = generatedText;
        outputEl.style.background = '#0a4a0a';
        
        console.log('✅ Generated:', generatedText);
        
      } catch (err) {
        outputEl.textContent = '❌ Error: ' + err.message;
        outputEl.style.background = '#4a0a0a';
        console.error('Generation error:', err);
      }
    };

    // Load model on page load
    loadModel();
  </script>
</body>
</html>
